<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Birthday Cake 🎂</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
            href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
            rel="stylesheet"
    />
    <style>
        #mainTitle {
            font-size: 32px;
            font-family: 'Pixelify Sans', sans-serif;
            margin-bottom: 8px;
        }

        #subTitle {
            font-size: 18px;
            font-family: 'Pixelify Sans', sans-serif;
            color: #555;
            margin-bottom: 15px;
        }

        #startBtn {
            font-family: 'Pixelify Sans', sans-serif;
            font-size: 16px;
            padding: 10px 20px;
            background-color: #ff6b81;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            margin-bottom: 20px;
        }

        #startBtn:hover {
            transform: scale(1.05);
            background-color: #ff4757;
        }

        /* Itatago muna ang apoy sa simula hanggang hindi pa napipindot ang button */
        .candle::after, .candle .flame {
            display: none !important;
        }

        /* Lalabas lang ang apoy kapag may class na 'is-lit' */
        .candle.is-lit::after, .candle.is-lit .flame {
            display: block !important;
        }

        /* Kapag umihip na o hinipan, mawawala ulit ang apoy */
        .candle.blown::after, .candle.blown .flame {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="container" style="text-align: center; margin-top: 50px;">
    <div id="birthdayText"></div>
    
    <button id="startBtn">Light the Candles 🕯️</button>
    
    <div class="cake-container" style="cursor: pointer;">
        <div class="cake" id="cake"></div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name") || "Aliaj";
    let candleCount = parseInt(params.get("candles")) || 4;
    candleCount = Math.min(Math.max(candleCount, 1), 30);

    const birthdayText = document.getElementById("birthdayText");
    birthdayText.innerHTML = `
        <div id="mainTitle">Happy Birthday, ${name}!</div>
        <div id="subTitle">Click the button below to light up the cake!</div>
      `;

    const cake = document.getElementById("cake");
    const startBtn = document.getElementById("startBtn");

    const colors = [
        "green-candle",
        "purple-candle",
        "blue-candle",
        "yellow-candle",
    ];
    const CAKE_VISUAL_WIDTH = 35;

    function createCandles(count) {
        cake.innerHTML = "";
        const CANDLE_VISUAL_WIDTH = 2;
        const availableWidth = CAKE_VISUAL_WIDTH;
        const candlesPerRow = 6;
        const shiftAmount = 4;

        for (let i = 0; i < count; i++) {
            const candle = document.createElement("div");
            candle.classList.add("candle");
            const colorClass = colors[Math.floor(Math.random() * colors.length)];
            candle.classList.add(colorClass);

            const row = Math.floor(i / candlesPerRow);
            const col = i % candlesPerRow;
            const totalCandlesInRow = Math.min(
                candlesPerRow,
                count - row * candlesPerRow
            );
            const rowSpacing = availableWidth / (totalCandlesInRow + 1);

            const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
            const rowShift = row % 2 === 0 ? 0 : shiftAmount;

            candle.style.position = "absolute";
            candle.style.top = `${10 + row * 3}px`;
            candle.style.left = `${leftBase - rowShift + 4}px`;

            cake.appendChild(candle);
        }
    }

    createCandles(candleCount);

    let blown = false;

    startBtn.addEventListener("click", () => {
        startBtn.style.display = "none";
        document.getElementById("subTitle").textContent = "Make a wish and BLOW the candles! 🌬️";
        
        // Dito natin sisindihan ang mga kandila pagka-click ng button
        const candles = document.querySelectorAll(".candle");
        candles.forEach(candle => {
            candle.classList.add("is-lit");
        });

        startMicDetection();
    });

    async function startMicDetection() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            
            const processor = audioContext.createScriptProcessor(2048, 1, 1);
            
            source.connect(processor);
            processor.connect(audioContext.destination);

            processor.onaudioprocess = function(e) {
                if (blown) return;
                
                const inputData = e.inputBuffer.getChannelData(0);
                let sum = 0;
                
                for (let i = 0; i < inputData.length; i++) {
                    sum += inputData[i] * inputData[i];
                }
                const volume = Math.sqrt(sum / inputData.length);
                
                if (volume > 0.12) {
                    blown = true;
                    blowOutCandles();
                    
                    stream.getTracks().forEach(track => track.stop());
                    processor.disconnect();
                }
            };
        } catch (err) {
            console.error(err);
            alert("Please allow microphone access to blow out the candles, or just click the cake directly!");
        }
    }

    function blowOutCandles() {
        blown = true; 
        
        const candles = document.querySelectorAll(".candle");
        candles.forEach((candle) => {
            const delay = Math.random() * 1000;
            setTimeout(() => {
                colors.forEach((color) => {
                    if (candle.classList.contains(color)) {
                        candle.classList.add("blown");
                        candle.classList.remove("is-lit");
                    }
                });
            }, delay);
        });

        setTimeout(() => {
            const subTitle = document.getElementById("subTitle");
            subTitle.textContent = `Yayy! Wishing you the happiest birthday ever!! 🎉`;
        }, 1200);
    }

    cake.addEventListener("click", () => {
        if (!blown) {
            startBtn.style.display = "none";
            // Kung clinick ang cake nang hindi pa napipindot ang button, sisindihan muna saglit tapos papatayin
            const candles = document.querySelectorAll(".candle");
            candles.forEach(candle => candle.classList.add("is-lit"));
            
            blowOutCandles();
        }
    });
</script>
</body>
</html>
